<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Caption Pro - Pink</title>
    <style>
        :root { --pink-main: #ff758c; --pink-dark: #ff5e78; --bg-color: #fff5f7; --text-main: #4a4a4a; }
        body { font-family: sans-serif; background: var(--bg-color); margin: 0; padding: 10px; color: var(--text-main); }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(255,117,140,0.2); }
        h2 { text-align: center; font-size: 1.3rem; margin-bottom: 20px; color: var(--pink-dark); }
        .prop-btn { background: #fff; border: 1px solid var(--pink-main); padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; text-align: left; font-weight: 600; color: var(--pink-dark); margin-bottom: 8px; }
        .back-btn { background: var(--pink-main); color: white; width: 100%; padding: 12px; border: none; border-radius: 12px; margin-bottom: 20px; cursor: pointer; font-weight: bold; }
        #caption-list { display: flex; flex-direction: column; gap: 12px; }
        .item-row { display: flex; flex-direction: column; border: 2px solid var(--pink-main); border-radius: 12px; overflow: hidden; background: #fff; }
        .copy-btn { background: #fff; color: var(--pink-dark); border: none; border-bottom: 1px solid #ffeef1; padding: 12px; cursor: pointer; font-weight: bold; }
        .edit-area { border: none; padding: 12px; width: 100%; box-sizing: border-box; min-height: 120px; font-size: 0.95rem; line-height: 1.5; }
        .used-item { opacity: 0.4; order: 1; border-color: #ccc; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="main-menu">
    <h2>🏠 ทรัพย์สินทั้งหมด (21 รายการ)</h2>
    <div id="property-grid"></div>
</div>

<div class="container hidden" id="caption-menu">
    <button class="back-btn" onclick="showMain()">⬅ กลับหน้าเลือกทรัพย์</button>
    <h2 id="selected-title"></h2>
    <div id="caption-list"></div>
</div>

<script>
    const props = ["บ้านเอื้ออาทรอรัญประเทศ", "บ้านพรสิริ ขอนแก่น", "คอนโดชีวาทัย ฮอลล์มาร์ค", "บ้านพี่ปองพระประแดง", "แฮปปี้คอนโด", "คอนโด The Base Park East", "พี่ศรีไพร (คอนสาย)", "ที่ดินน้ำจิต วังน้ำเย็น", "บ้านทาวน์โฮมพฤกษา 9", "ที่ดินบ้านนา นครนายก", "พี่แอน ห้องเช่า 3 ห้อง", "บ้านพี่แดง อรัญนคร 3", "โกดัง 1 ไร่", "บ้านอรัญนคร 1", "พี่แอน ห้องเช่า 9 ห้อง", "คอนโดสุขุมวิท 49", "BANGKOK HORIZON รามคำแหง", "กรีนเน่ คอนโดดอนเมือง", "แม่ย่าพี่ปลา 14 ไร่", "ที่ดิน หลังอรัญนคร 1", "บ้านพี่หนึ่ง อรัญวิลล์"];

    // ข้อมูลที่คุณเคยให้มา ใส่ไว้ในนี้ทั้งหมดแล้วครับ
    const savedData = {
        "13": [`🏡 บ้านในฝันของครอบครัว…มีอยู่จริง\n💸 ราคาเอื้อมถึง แค่ 3.4 ล้านกว่า\n🔥 ได้บ้านใหญ่ + เฟอร์ครบทั้งหลัง\n\nฝันมีบ้าน…ไม่ไกลอีกต่อไป 💛\n\n📍 หมู่บ้านอรัญนคร 1 อ.อรัญประเทศ จ.สระแก้ว`, `👨‍👩‍👧‍👦 บ้านที่ “อยู่ได้ทั้งครอบครัว”\n🏡 4 ห้องนอน ไม่ต้องแย่งพื้นที่\n💖 ฟังก์ชันครบ ใช้ชีวิตง่าย\n\nจบในหลังเดียว ไม่ต้องขยับขยายเพิ่ม\n\n📍 หมู่บ้านอรัญนคร 1 อ.อรัญประเทศ จ.สระแก้ว`],
        "18": [`🏗️ ที่ดิน 14 ไร่ ติดถนน 3 ด้าน\n📐 วางผังโครงการได้เต็มพื้นที่\n💸 ต้นทุนต่อไร่คุ้ม ทำกำไรได้จริง\n\nแปลงเดียว…ทำได้ทั้งหมู่บ้านหรือคอมมูนิตี้ 💼\n\n📍 ต.บ้านด่าน ใกล้โลตัสอรัญฯ 3 กม.`],
        "15": [`✨ ใช้ชีวิตในแบบที่ “เลือกได้”\n🌿 ความสงบกลางเมืองที่หาได้ยาก\n🏙️ เชื่อมต่อสุขุมวิท พร้อมทุกไลฟ์สไตล์\n\n📍 The Crest Sukhumvit 49`],
        "16": [`🏙️ BANGKOK HORIZON รามคำแหง\n🔥 40 ตร.ม. ห้องใหญ่ หายากในงบนี้!\n💸 2.59 ล้าน ได้ฟีลพรีเมียม`]
    };

    const grid = document.getElementById('property-grid');
    props.forEach((name, i) => {
        let b = document.createElement('button');
        b.className = 'prop-btn';
        b.innerText = `${i+1}. ${name}`;
        b.onclick = () => showCaps(name, i);
        grid.appendChild(b);
    });

    function showCaps(name, propIndex) {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('caption-menu').classList.remove('hidden');
        document.getElementById('selected-title').innerText = name;
        const list = document.getElementById('caption-list');
        list.innerHTML = ''; 
        
        for (let j = 0; j < 15; j++) {
            let initialText = savedData[propIndex] ? (savedData[propIndex][j] || "") : "";
            let row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `<button class="copy-btn">📋 คัดลอกแบบที่ ${j+1}</button><textarea class="edit-area">${initialText}</textarea>`;
            
            row.querySelector('.copy-btn').onclick = function() {
                navigator.clipboard.writeText(row.querySelector('.edit-area').value);
                this.innerText = "✅ คัดลอกสำเร็จ!";
                row.classList.add('used-item');
                list.appendChild(row);
                setTimeout(() => this.innerText = `📋 คัดลอกแบบที่ ${j+1}`, 1500);
            };
            list.appendChild(row);
        }
    }

    function showMain() {
        document.getElementById('main-menu').classList.remove('hidden');
        document.getElementById('caption-menu').classList.add('hidden');
    }
</script>
</body>
</html>

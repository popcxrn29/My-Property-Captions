<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Caption Hub</title>
    <style>
        :root { --dark-blue: #003366; --fb-blue: #1877f2; --bg-color: #f4f7f9; --text-main: #2d3436; }
        body { font-family: sans-serif; background: var(--bg-color); margin: 0; padding: 15px; color: var(--text-main); }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; font-size: 1.4rem; margin-bottom: 25px; }
        .prop-btn { background: #ffffff; border: 1px solid #e0e0e0; padding: 16px 20px; border-radius: 12px; margin-bottom: 10px; width: 100%; text-align: left; cursor: pointer; font-weight: 600; display: flex; align-items: center; }
        .back-btn { background: var(--dark-blue); color: white; width: 100%; padding: 14px; border: none; border-radius: 12px; margin-bottom: 20px; font-weight: bold; cursor: pointer; }
        .item-row { display: flex; flex-direction: column; background: #ffffff; border-radius: 12px; border: 2px solid var(--fb-blue); overflow: hidden; margin-bottom: 15px; }
        .copy-btn { background: #ffffff; color: var(--fb-blue); border: none; border-bottom: 1px solid #eee; padding: 14px; cursor: pointer; font-weight: 700; font-size: 1rem; }
        .edit-area { border: none; padding: 15px; width: 100%; box-sizing: border-box; min-height: 120px; font-family: inherit; line-height: 1.5; }
        .used-item { opacity: 0.5; order: 1; border-color: #ccd0d5; }
        .hidden { display: none; }
        .num-badge { background: #f0f2f5; padding: 2px 8px; border-radius: 6px; margin-right: 12px; font-size: 0.8rem; color: #636e72; }
    </style>
</head>
<body>

<div class="container" id="main-menu">
    <h2>🏠 ทรัพย์สินทั้งหมด (21 รายการ)</h2>
    <div id="property-grid"></div>
</div>

<div class="container hidden" id="caption-menu">
    <button class="back-btn" onclick="showMain()">⬅ กลับหน้าเลือกทรัพย์</button>
    <h2 id="selected-title"></h2>
    <div id="caption-list"></div>
</div>

<script>
    const props = [
        "บ้านเอื้ออาทรอรัญประเทศ", "บ้านพรสิริ ขอนแก่น", "คอนโดชีวาทัย ฮอลล์มาร์ค", 
        "บ้านพี่ปองพระประแดง", "แฮปปี้คอนโด", "คอนโด The Base Park East", 
        "พี่ศรีไพร (คอนสาย)", "ที่ดินน้ำจิต วังน้ำเย็น", "บ้านทาวน์โฮมพฤกษา 9", 
        "ที่ดินบ้านนา นครนายก", "พี่แอน ห้องเช่า 3 ห้อง", "บ้านพี่แดง อรัญนคร 3", 
        "โกดัง 1 ไร่", "บ้านอรัญนคร 1", "พี่แอน ห้องเช่า 9 ห้อง", 
        "คอนโดสุขุมวิท 49", "BANGKOK HORIZON รามคำแหง", "กรีนเน่ คอนโดดอนเมือง", 
        "แม่ย่าพี่ปลา 14 ไร่", "ที่ดิน หลังอรัญนคร 1", "บ้านพี่หนึ่ง อรัญวิลล์"
    ];

    const grid = document.getElementById('property-grid');
    props.forEach((name, i) => {
        let b = document.createElement('button');
        b.className = 'prop-btn';
        b.innerHTML = `<span class="num-badge">${i+1}</span> ${name}`;
        b.onclick = () => showCaps(name, i);
        grid.appendChild(b);
    });

    function showCaps(name, propIndex) {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('caption-menu').classList.remove('hidden');
        document.getElementById('selected-title').innerText = name;
        const list = document.getElementById('caption-list');
        list.innerHTML = ''; 
        
        for (let j = 1; j <= 15; j++) {
            const storageKey = `cap_${propIndex}_${j}`;
            let savedText = localStorage.getItem(storageKey) || "";

            let row = document.createElement('div');
            row.className = 'item-row';
            let btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.innerText = `📋 คัดลอกแคปชั่นชุดที่ ${j}`;
            let area = document.createElement('textarea');
            area.className = 'edit-area';
            area.value = savedText;
            area.oninput = () => localStorage.setItem(storageKey, area.value);

            btn.onclick = () => {
                navigator.clipboard.writeText(area.value);
                btn.innerText = "✅ คัดลอกสำเร็จ!";
                row.classList.add('used-item');
                list.appendChild(row); 
                setTimeout(() => btn.innerText = `📋 คัดลอกแคปชั่นชุดที่ ${j}`, 1500);
            };
            row.appendChild(btn);
            row.appendChild(area);
            list.appendChild(row);
        }
    }

    function showMain() {
        document.getElementById('main-menu').classList.remove('hidden');
        document.getElementById('caption-menu').classList.add('hidden');
    }
</script>
</body>
</html>
